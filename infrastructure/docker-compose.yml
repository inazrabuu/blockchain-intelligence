services:
  postgres:
    image: postgres:17
    container_name: blockchain-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: blockchain

    ports:
      - "5431:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: blockchain-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
